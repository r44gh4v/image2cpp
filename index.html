<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image2cpp - Image & GIF to C++ Array</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <h1>image2cpp</h1>
            </div>
            <p class="tagline">Convert Images & GIFs to Byte Arrays</p>
            <div class="header-controls">
                <button
                    id="app-theme-toggle"
                    type="button"
                    class="theme-toggle-btn"
                    aria-label="App theme mode: System"
                    title="App theme mode: System"
                >Theme: System</button>
            </div>
        </div>
    </header>

    <main class="workspace">
        <!-- Col 1: Setup & Input -->
        <section class="panel panel-setup">
            <div class="card">
                <div class="card-header">
                    <h2>1. Input Source</h2>
                </div>
                <div class="drop-zone" id="drop-zone">
                    <svg class="drop-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span class="drop-text">Drop file or Browse</span>
                    <span class="drop-hint">GIF, PNG, JPEG, WEBP</span>
                </div>
                <input type="file" id="file-input" class="is-hidden" accept="image/png, image/jpeg, image/gif, image/webp">
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>2. Display Setup</h2>
                </div>
                <div class="setting-group">
                    <label>Presets</label>
                    <div class="preset-chips">
                        <button class="preset-btn" data-preset="128x64">128×64</button>
                        <button class="preset-btn" data-preset="128x32">128×32</button>
                        <button class="preset-btn" data-preset="96x64">96×64</button>
                        <button class="preset-btn" data-preset="84x48">84×48</button>
                        <button class="preset-btn" data-preset="64x64">64×64</button>
                        <button class="preset-btn" data-preset="200x200">200×200</button>
                        <button class="preset-btn" data-preset="250x122">250×122</button>
                        <button class="preset-btn" data-preset="400x300">400×300</button>
                    </div>
                </div>
                <div class="setting-group mt-3">
                    <label>Dimensions (WxH)</label>
                    <div class="size-inputs">
                        <input type="number" id="canvas-width" value="128" min="1">
                        <button id="btn-swap-wh" class="icon-btn" title="Swap Width/Height"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 21 7 17 3"></polyline><line x1="21" y1="7" x2="9" y2="7"></line><polyline points="7 21 3 17 7 13"></polyline><line x1="3" y1="17" x2="15" y2="17"></line></svg></button>
                        <input type="number" id="canvas-height" value="64" min="1">
                    </div>
                </div>
                <div class="setting-group mt-2">
                    <label>Scaling Mode</label>
                    <select id="setting-scale" class="custom-select">
                        <option value="fit">Fit (Preserve Ratio)</option>
                        <option value="stretch">Stretch to Fill</option>
                        <option value="original">Original Size</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Col 2: Tuning & Export -->
        <section class="panel panel-tuning">
            <div class="card">
                <div class="card-header">
                    <h2>3. Media Tune</h2>
                </div>

                <div class="setting-group">
                    <div class="label-row">
                        <label><svg class="tune-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path fill="currentColor" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2V22Z"/></svg> Contrast</label>
                        <span id="contrast-val" class="badge interactive" title="Click to Reset">0</span>
                    </div>
                    <input type="range" id="setting-contrast" min="-255" max="255" value="0">
                </div>

                <div class="setting-group mt-2">
                    <div class="label-row">
                        <label><svg class="tune-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg> Threshold / Brightness</label>
                        <span id="threshold-val" class="badge interactive" title="Click to Reset">128</span>
                    </div>
                    <input type="range" id="setting-threshold" min="0" max="255" value="128">
                </div>
                
                <div class="checkbox-row mt-3">
                    <label class="cb-wrap"><input type="checkbox" id="setting-invert"><span class="cb"></span> Invert</label>
                    <label class="cb-wrap is-hidden" id="wrap-invert-bg"><input type="checkbox" id="setting-invert-bg"><span class="cb"></span> Invert BG</label>
                </div>
                <div class="setting-group mt-3">
                    <label>Transformations</label>
                    <div class="action-row">
                        <button id="btn-flip-h" class="action-btn outline" title="Flip Horizontal"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 7 5 5-5 5V7z"/><path d="m21 7-5 5 5 5V7z"/><path d="M12 2v20"/></svg></button>
                        <button id="btn-flip-v" class="action-btn outline" title="Flip Vertical"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 3-5 5-5-5h10z"/><path d="m17 21-5-5-5 5h10z"/><path d="M2 12h20"/></svg></button>
                        <button id="btn-rotate" class="action-btn outline" title="Rotate 90°"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>4. Code Tune</h2>
                </div>
                <div class="setting-group">
                    <select id="draw-mode" class="custom-select">
                        <option value="vertical">Vertical (Adafruit GFX / u8g2)</option>
                        <option value="horizontal">Horizontal (1 Byte = 8px Row)</option>
                    </select>
                </div>
                <div class="setting-group mt-2">
                    <select id="output-format" class="custom-select">
                        <option value="arduino">Arduino PROGMEM</option>
                        <option value="plain">Plain C/C++ Array</option>
                    </select>
                </div>
                <div class="setting-group mt-2">
                    <input type="text" id="var-name" value="epd_bitmap_img" placeholder="Variable Name">
                </div>
            </div>
        </section>

        <!-- Col 3: Preview & Code -->
        <section class="panel panel-result">
            <div class="card flex-col">
                <div class="card-header">
                    <h2>5. Output Preview</h2>
                    <div class="header-actions">
                        <select id="preview-theme" class="custom-select sm">
                            <option value="oled-white">OLED: White</option>
                            <option value="oled-blue">OLED: Blue</option>
                            <option value="oled-yellow">OLED: Yellow</option>
                            <option value="lcd-green">LCD: Green</option>
                        </select>
                    </div>
                </div>
                
                <div class="preview-area">
                    <div class="preview-info" id="preview-info">128 × 64</div>
                    <canvas id="preview-canvas" width="128" height="64"></canvas>
                </div>
                
                <div class="gif-frames-timeline is-hidden" id="gif-frames"></div>

                <div class="code-area">
                    <div class="code-toolbar">
                        <span class="code-title">C++ Byte Array</span>
                        <div class="code-actions">
                            <button class="action-btn highlight" id="btn-copy" title="Copy to Clipboard"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy</button>
                            <button class="action-btn outline" id="btn-download" title="Download .h File"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> .h</button>
                        </div>
                    </div>
                    <textarea id="code-output" readonly spellcheck="false" placeholder="// Cooked output..."></textarea>
                </div>
            </div>
        </section>
    </main>

    <script src="js/vendor/omggif.js"></script>
    <script src="js/processor.js"></script>
    <script src="js/generator.js"></script>
    <script src="js/core/constants.js"></script>
    <script src="js/core/settings.js"></script>
    <script src="js/core/frame-manager.js"></script>
    <script src="js/core/url-manager.js"></script>
    <script src="js/core/state-store.js"></script>
    <script src="js/core/ui-theme-service.js"></script>
    <script src="js/core/preview-service.js"></script>
    <script src="js/core/gif-workflow-service.js"></script>
    <script src="js/core/file-workflow-service.js"></script>
    <script src="js/ui/custom-select-controller.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
